format:
  html:
    theme: cosmo
    css: styles.css
    toc: false
    smooth-scroll: true
    header-includes: |
      <script>
        document.addEventListener("DOMContentLoaded", function () {
          const header = document.getElementById("quarto-header");
          if (!header) return;
          if (header.querySelector(".vss-topbar")) return;
          const bar = document.createElement("div");
          bar.className = "vss-topbar";
          bar.innerHTML =
            '<div class="vss-topbar-inner">' +
              '<div class="vss-topbar-left">' +
                '<a href="mailto:vsskb@rediffmail.com" class="vss-topbar-link"><i class="bi bi-envelope-fill" aria-hidden="true"></i><span>vsskb@rediffmail.com</span></a>' +
                '<a href="tel:+919672499564" class="vss-topbar-link"><i class="bi bi-telephone-fill" aria-hidden="true"></i><span>+91 9672499564</span></a>' +
              '</div>' +
              '<div class="vss-topbar-center">' +
                '<a href="donation.html" class="vss-topbar-donate"><i class="bi bi-heart-fill" aria-hidden="true"></i><span>Donate Now</span></a>' +
              '</div>' +
              '<div class="vss-topbar-right" aria-label="Social links">' +
                '<a href="https://www.facebook.com/share/1J129dcf94/" target="_blank" rel="noopener" class="vss-topbar-icon" aria-label="Facebook"><i class="bi bi-facebook" aria-hidden="true"></i></a>' +
                '<a href="https://youtube.com" target="_blank" rel="noopener" class="vss-topbar-icon" aria-label="YouTube"><i class="bi bi-youtube" aria-hidden="true"></i></a>' +
                '<a href="https://www.instagram.com/invites/contact/?igsh=10hj0dse9xje5&utm_content=zcbfie2" target="_blank" rel="noopener" class="vss-topbar-icon" aria-label="Instagram"><i class="bi bi-instagram" aria-hidden="true"></i></a>' +
                '<a href="https://www.linkedin.com/company/vasundhara-sewa-samiti/" target="_blank" rel="noopener" class="vss-topbar-icon" aria-label="LinkedIn"><i class="bi bi-linkedin" aria-hidden="true"></i></a>' +
                '<a href="https://twitter.com" target="_blank" rel="noopener" class="vss-topbar-icon" aria-label="Twitter"><i class="bi bi-twitter" aria-hidden="true"></i></a>' +
              '</div>' +
            '</div>';
          header.prepend(bar);
        });
      </script>
