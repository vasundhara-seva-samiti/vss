    logo-height: 110px
    title: false
    background: "#e8f3e8"
    foreground: "dark"
    left:
      - text: "Home"
        href: index.qmd
      - text: "About Us"
        menu:
          - text: "About"
            href: about.qmd
          - text: "Mission and Vision"
